
name: Build

# Builds the TypeScript SDK (on a Node runner) and the Sonic-Mania-static RSDKv5U
# WASM (inside an emscripten/emsdk container job — build.sh runs there directly,
# no `docker run`). On tags it merges both into a Release; on main / manual runs
# it publishes the demo (dist/) to GitHub Pages.
#
# APPROACH A CAVEAT: build.sh bakes Data.rsdk into rsdkv5.data at build time, and
# game data is proprietary — it cannot live in the repo. The wasm job therefore
# fetches it from the RSDKV5_DATA_URL secret (a private, pre-authenticated URL);
# when that secret is not configured the wasm job (and the release/pages jobs
# depending on it) is skipped rather than failed.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Serialize Pages deployments (don't cancel an in-progress one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Build SDK (TypeScript)
        run: make build-sdk
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: dist/

  # Expose whether the game-data secret is configured as a job output (secrets
  # can't be referenced in job-level `if` directly).
  data-check:
    runs-on: ubuntu-latest
    outputs:
      has-data: ${{ steps.check.outputs.has-data }}
    steps:
      - id: check
        env:
          RSDKV5_DATA_URL: ${{ secrets.RSDKV5_DATA_URL }}
        run: echo "has-data=${{ env.RSDKV5_DATA_URL != '' }}" >> "$GITHUB_OUTPUT"

  wasm:
    needs: data-check
    if: needs.data-check.outputs.has-data == 'true'
    runs-on: ubuntu-latest
    # Pinned to the toolchain the proven recipe was verified with (see
    # docs/wasm-build-shared-core.md), not :latest.
    container: emscripten/emsdk:6.0.2
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Data.rsdk
        env:
          RSDKV5_DATA_URL: ${{ secrets.RSDKV5_DATA_URL }}
        run: |
          mkdir -p dist
          curl -fsSL "$RSDKV5_DATA_URL" -o dist/Data.rsdk
      # build.sh runs directly in this container (emcc/make/git/python3/perl are
      # all present in emscripten/emsdk); it does not call Docker itself.
      - name: Build WASM
        run: bash scripts/build.sh
      # rsdkv5.data IS the preloaded Data.rsdk (+Settings.ini) — proprietary game
      # data. It must never reach a public Release or Pages; hosts run build.sh
      # with their own Data.rsdk to produce it. Only the engine js/wasm ship.
      - name: Strip proprietary game data from artifact
        run: rm -f dist/Data.rsdk dist/rsdkv5/rsdkv5.data
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: dist/

  release:
    needs: [sdk, wasm]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist
      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rsdkv5/rsdkv5.js
            dist/rsdkv5/rsdkv5.wasm
            dist/rsdkv5/rsdkv5.sdk.js
            dist/rsdkv5/rsdkv5.sdk.d.ts
            dist/rsdkv5/rsdkv5.options.js
            dist/rsdkv5/rsdkv5.options.d.ts
            dist/rsdkv5/rsdkv5.manifest.js
            dist/rsdkv5/rsdkv5.manifest.d.ts
            dist/manifest.json
            dist/index.html
            dist/demo.js

  # Publish the demo (dist/) to GitHub Pages. No Data.rsdk ships (git-ignored), so
  # the live demo shows the pick/drag-and-drop fallback. NOTE: GitHub Pages can't
  # send COOP/COEP headers, so the page is not cross-origin isolated → OPFS won't
  # engage and the SDK uses the in-memory WASMFS backend.
  pages:
    needs: [sdk, wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
