<!doctype html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Sonic Mania</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      overflow: hidden;
    }

    .canvas-container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0px none;
      background-color: black;
    }

    .canvas-container .emscripten {
      aspect-ratio: 424/240;
      display: block;
      margin: auto;
      width: 100%;
      max-height: 100%;
      outline: none;
    }
  </style>

  <!-- Map the bare package specifier to the built SDK, exactly as a real
       host consumes the package. -->
  <script type="importmap">
    {
      "imports": {
        "@wasm-gaming/rsdkv5-wasm": "./rsdkv5/rsdkv5.sdk.js"
      }
    }
  </script>
</head>

<body>
  <div class="canvas-container">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <!-- Data.rsdk pick / drag-and-drop fallback (demo.js drives it; hidden once
       the engine boots). These ids are load-bearing: demo.ts queries them. -->
  <div id="picker" style="position:absolute;left:0;right:0;bottom:1.5rem;margin:0 auto;
       max-width:40rem;text-align:center;color:#eee;font:14px system-ui;
       background:#000a;padding:1rem;border-radius:.5rem;">
    <p id="status">Looking for Data.rsdk…</p>
    <input id="file" type="file" accept=".rsdk" hidden>
  </div>
  <style>
    #picker.hidden { display: none; }
    #picker.dragover { outline: 2px dashed #6cf; }
  </style>

  <script type="module" src="./demo.js"></script>
</body>

</html>
